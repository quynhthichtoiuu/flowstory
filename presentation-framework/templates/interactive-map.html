<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>[Product] — Interactive Map</title>
<meta name="description" content="[SEO description]" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap&subset=vietnamese" rel="stylesheet" />

<link rel="stylesheet" href="design-tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="animations.css" />
<style>
  header.hero { padding: 72px 0 32px; }
  header.hero h1 { font-size: clamp(2.1rem, 4.2vw, 3.2rem); margin-bottom: 18px; }
  header.hero .cta { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }

  .map-section { padding: 20px 0 60px; }
  .map-shell { position: relative; background: #fff; border: 1px solid var(--light-gray); border-radius: var(--radius); overflow: hidden; }
  .map-shell svg { display: block; width: 100%; height: auto; }

  /* Building hotspots */
  .building { cursor: pointer; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s; transform-origin: center; transform-box: fill-box; }
  .building:hover { filter: brightness(1.08) drop-shadow(0 6px 14px rgba(20,20,19,0.12)); transform: translateY(-2px); }
  .building.active rect:first-child, .building.active path:first-child { stroke: var(--gold) !important; stroke-width: 3.5 !important; filter: drop-shadow(0 0 8px rgba(212,160,0,0.5)); }
  .building.visited .marker-circle { fill: var(--green); }

  .marker-ping { transform-origin: center; transform-box: fill-box; animation: marker-breath 2.6s ease-in-out infinite; pointer-events: none; }
  .building.visited .marker-ping { animation: none; opacity: 0; }

  .b-label { font-family: var(--font-head); font-weight: 600; font-size: 14px; fill: var(--dark); pointer-events: none; }
  .b-sub { font-family: var(--font-head); font-size: 11px; fill: var(--dark); opacity: 0.7; pointer-events: none; }

  /* Legend */
  .legend { display: flex; gap: 18px; flex-wrap: wrap; padding: 14px 20px; background: var(--light); border-top: 1px solid var(--light-gray); font-family: var(--font-head); font-size: 13px; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .sw { width: 12px; height: 12px; border-radius: 3px; }

  /* Drawer */
  .drawer .pill { display: inline-block; font-family: var(--font-head); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; background: var(--gold); color: var(--light); }
  .drawer h2 { font-size: 1.8rem; margin: 12px 0 6px; }
  .drawer .subtitle { font-family: var(--font-head); font-size: 14px; color: var(--dark); opacity: 0.68; margin-bottom: 22px; }
  .drawer h3 { font-family: var(--font-head); font-weight: 600; font-size: 0.95rem; letter-spacing: 0.02em; color: var(--gold); text-transform: uppercase; margin: 22px 0 8px; }
  .drawer p { font-size: 15px; line-height: 1.65; margin: 0 0 14px; }
  .drawer ul { padding-left: 20px; margin: 0 0 14px; font-size: 15px; }
  .drawer .tech-block { background: var(--dark); color: var(--light); border-radius: 10px; padding: 16px 20px; margin: 14px 0; }
  .drawer .tech-block p { color: var(--light); opacity: 0.92; font-size: 14px; margin: 0 0 6px; }
  .drawer .tech-block code { background: rgba(255,255,255,0.1); color: var(--light); }
</style>
</head>
<body>

<nav class="top">
  <div class="wrap">
    <a href="#" class="brand">[Product Name]</a>
    <div class="links">
      <a href="#">Overview</a>
      <a href="#">Docs</a>
      <a href="#">GitHub</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <h1>[Interactive Map Title]</h1>
    <p class="lede">[Description of what this map shows. Click on areas to learn more.]</p>
    <div class="cta">
      <button class="btn btn-primary" onclick="startTour()">Start Tour</button>
      <button class="btn btn-ghost" onclick="resetMap()">Reset</button>
    </div>
  </div>
</header>

<section class="map-section">
  <div class="wrap">
    <div class="map-shell">
      <!-- Replace with your SVG map -->
      <svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
        <rect width="1200" height="600" fill="#f7f3ed"/>

        <!-- Example Building 1 -->
        <g class="building" data-id="area-1" onclick="openDrawer('area-1')">
          <rect x="100" y="200" width="200" height="150" rx="12" fill="#fff" stroke="#e0dcd6" stroke-width="1.5"/>
          <circle class="marker-circle" cx="200" cy="180" r="12" fill="#d4a000"/>
          <circle class="marker-ping" cx="200" cy="180" r="12" fill="#d4a000" opacity="0.3"/>
          <text class="b-label" x="200" y="270" text-anchor="middle">[Area 1]</text>
          <text class="b-sub" x="200" y="290" text-anchor="middle">[Subtitle]</text>
        </g>

        <!-- Example Building 2 -->
        <g class="building" data-id="area-2" onclick="openDrawer('area-2')">
          <rect x="400" y="200" width="200" height="150" rx="12" fill="#fff" stroke="#e0dcd6" stroke-width="1.5"/>
          <circle class="marker-circle" cx="500" cy="180" r="12" fill="#d4a000"/>
          <circle class="marker-ping" cx="500" cy="180" r="12" fill="#d4a000" opacity="0.3"/>
          <text class="b-label" x="500" y="270" text-anchor="middle">[Area 2]</text>
          <text class="b-sub" x="500" y="290" text-anchor="middle">[Subtitle]</text>
        </g>

        <!-- Example Building 3 -->
        <g class="building" data-id="area-3" onclick="openDrawer('area-3')">
          <rect x="700" y="200" width="200" height="150" rx="12" fill="#fff" stroke="#e0dcd6" stroke-width="1.5"/>
          <circle class="marker-circle" cx="800" cy="180" r="12" fill="#d4a000"/>
          <circle class="marker-ping" cx="800" cy="180" r="12" fill="#d4a000" opacity="0.3"/>
          <text class="b-label" x="800" y="270" text-anchor="middle">[Area 3]</text>
          <text class="b-sub" x="800" y="290" text-anchor="middle">[Subtitle]</text>
        </g>

        <!-- Connection lines -->
        <path d="M300 275 L400 275" stroke="#e0dcd6" stroke-width="2" stroke-dasharray="5 5" class="flow"/>
        <path d="M600 275 L700 275" stroke="#e0dcd6" stroke-width="2" stroke-dasharray="5 5" class="flow"/>
      </svg>

      <div class="legend">
        <span><i class="sw" style="background: var(--gold);"></i> [Category 1]</span>
        <span><i class="sw" style="background: var(--green);"></i> [Category 2]</span>
        <span><i class="sw" style="background: var(--blue);"></i> [Category 3]</span>
      </div>
    </div>
  </div>
</section>

<!-- Drawer Panel -->
<aside class="drawer" id="drawer">
  <div class="drawer-inner">
    <button class="drawer-close" onclick="closeDrawer()">×</button>

    <div id="drawer-content">
      <!-- Content populated by JS -->
    </div>
  </div>
</aside>

<script>
// Area content data
const areaData = {
  'area-1': {
    pill: 'Module 01',
    title: '[Area 1 Title]',
    subtitle: '[Brief description]',
    sections: [
      { heading: 'Overview', content: '<p>[Detailed description of this area.]</p>' },
      { heading: 'Technical Details', content: '<div class="tech-block"><p><code>[technical info]</code></p></div>' },
      { heading: 'Key Points', content: '<ul><li>[Point 1]</li><li>[Point 2]</li></ul>' }
    ]
  },
  'area-2': {
    pill: 'Module 02',
    title: '[Area 2 Title]',
    subtitle: '[Brief description]',
    sections: [
      { heading: 'Overview', content: '<p>[Detailed description.]</p>' }
    ]
  },
  'area-3': {
    pill: 'Module 03',
    title: '[Area 3 Title]',
    subtitle: '[Brief description]',
    sections: [
      { heading: 'Overview', content: '<p>[Detailed description.]</p>' }
    ]
  }
};

function openDrawer(areaId) {
  const data = areaData[areaId];
  if (!data) return;

  // Mark as visited
  document.querySelector(`[data-id="${areaId}"]`)?.classList.add('visited');

  // Build content
  let html = `
    <span class="pill">${data.pill}</span>
    <h2>${data.title}</h2>
    <p class="subtitle">${data.subtitle}</p>
  `;
  data.sections.forEach(s => {
    html += `<h3>${s.heading}</h3>${s.content}`;
  });

  document.getElementById('drawer-content').innerHTML = html;
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

function startTour() {
  const areas = Object.keys(areaData);
  let i = 0;
  openDrawer(areas[i]);

  // Auto-advance every 5s (optional)
  // setInterval(() => { if (++i < areas.length) openDrawer(areas[i]); }, 5000);
}

function resetMap() {
  document.querySelectorAll('.building').forEach(b => b.classList.remove('visited', 'active'));
  closeDrawer();
}

// Close drawer on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
</script>

</body>
</html>
